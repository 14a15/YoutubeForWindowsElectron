<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    /* Área invisível para arrastar */
    #drag {
      position: fixed;
      top: 0;
      left: 0;
      width: calc(100% - 138px);
      height: 32px;
      -webkit-app-region: drag;
      z-index: 10;
      background: transparent;
    }

    /* Controlo estilo Windows 11 com fundo #0F0F0F */
    #window-controls {
      position: fixed;
      top: 0;
      right: 0;
      height: 32px;
      display: flex;
      z-index: 20;
      background: #0F0F0F;
    }

    #window-controls button {
      width: 46px;
      height: 32px;
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white; /* <- garante que o "-" é branco */
    }

    #window-controls button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #close:hover {
      background: #C42B1C;
    }

    /* Webview ocupa o ecrã inteiro */
    webview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div id="drag"></div>

  <div id="window-controls">
    <button id="minimize">—</button>

    <button id="maximize">
      <svg id="maximize-icon" width="12" height="12" viewBox="0 0 12 12">
        <rect x="1.5" y="1.5" width="9" height="9"
              stroke="white" stroke-width="1.4" fill="none"/>
      </svg>
    </button>

    <button id="close">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <path d="M1 1 L11 11 M11 1 L1 11"
              stroke="white" stroke-width="1.6"/>
      </svg>
    </button>
  </div>

  <webview src="https://www.youtube.com" allowpopups></webview>

  <script>
    const maximizeIcon = document.getElementById("maximize-icon");

    document.getElementById("minimize").onclick = () =>
      window.electronAPI.minimize();

    document.getElementById("maximize").onclick = () =>
      window.electronAPI.maximize();

    document.getElementById("close").onclick = () =>
      window.electronAPI.close();

    // mudar ícone quando maximiza
    window.electronAPI.onWindowState((state) => {
      if (state === "maximized") {
        maximizeIcon.innerHTML = `
          <path d="M3 1.5 H10.5 V9 H9 V3 H3 Z"
                stroke="white" stroke-width="1.4" fill="none"/>
          <rect x="1.5" y="3" width="7.5" height="7.5"
                stroke="white" stroke-width="1.4" fill="none"/>
        `;
      } else {
        maximizeIcon.innerHTML = `
          <rect x="1.5" y="1.5" width="9" height="9"
                stroke="white" stroke-width="1.4" fill="none"/>
        `;
      }
    });
  </script>

</body>
</html>
